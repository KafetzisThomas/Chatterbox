{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Register{% endblock title %}

{% block content %}
    <div class="container mb-4">
        <h1 class="mb-4 text-center fw-semibold">Create an account</h1>
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <form method="POST" action="{% url 'users:register' %}" class="bg-body-tertiary p-4 rounded-4 shadow-sm">
                    {% csrf_token %}
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-danger border-0 rounded-3 text-center">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                    {{ form|crispy }}
                    <button name="submit" class="btn btn-success rounded-3 w-100 mt-2">Register</button>
                </form>
            </div>
        </div>
    </div>
{% endblock content %}
